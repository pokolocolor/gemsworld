<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

<body>

  <div class="home-wrap">
    <div class="logo-area">
      <img class="logo-img"
           src="https://github.com/user-attachments/assets/364738bf-2bc9-49d1-b86c-b69325257320"
           alt="젬 있는 세상">
      <div class="logo-title">젬 있는 세상</div>
      <div class="logo-sub">Google Gem 공유 플랫폼</div>
    </div>

    <div class="menu-grid">
      <div class="menu-card" onclick="openGem('https://gemini.google.com/gem/1AJdDfAyaB1x60PV0gjAdSaeBoityoLbB?usp=sharing')">
        <div class="card-icon char">🎭</div>
        <div class="card-body">
          <div class="card-title">캐릭터 메이커</div>
          <div class="card-desc">AI로 나만의 캐릭터를 만들어 보세요</div>
        </div>
        <div class="card-arrow">›</div>
      </div>

      <div class="menu-card" onclick="openGem('https://gemini.google.com/gem/1iYKFc8k1AyT5v4kTHuqPHYd1zpIp6zo9?usp=sharing')">
        <div class="card-icon emoti">😊</div>
        <div class="card-body">
          <div class="card-title">이모티콘 메이커</div>
          <div class="card-desc">귀여운 이모티콘을 AI로 제작하세요</div>
        </div>
        <div class="card-arrow">›</div>
      </div>

      <a class="menu-card" href="editor.html">
        <div class="card-icon cut">✂️</div>
        <div class="card-body">

        </div>

      </a>
    </div>

    <div class="footer-txt">© 젬 있는 세상 · Google Gem 공유</div>
  </div>

  <script>
  function openGem(url) {
    // 방법 1: window.open 시도
    var w = window.open(url, '_blank');
    // 방법 2: window.open이 차단된 경우 (iOS 웹앱 등)
    if (!w || w.closed) {
      window.location.href = url;
    }
  }
  </script>

</body>
